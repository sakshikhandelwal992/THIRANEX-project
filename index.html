<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>To Do List</h1>

        <!-- Input Section -->
        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a task..."
            >

            <button id="addBtn">
                Add
            </button> <br><br>

        </div>

        <!-- Filter Buttons -->
        <div class="filter-section">
        <!-- Data-filter are used when implementing filtering functions-->
        <!--data-filter used to store custom data actually, don't have any built in function ; js->can read them and perform actions based on their values--> 
            <button class="filter-btn" data-filter="all" >
                All    <!-- shows all tasks-->
            </button>

            <button class="filter-btn" data-filter="active">
                Active  <!-- shows incomplete tasks-->
            </button>

            <button class="filter-btn" data-filter="completed">
                Completed  <!-- shows completed tasks-->
            </button>

        </div>

        <!-- Task List -->
        <ul id="taskList">   <!-- initially empty then js will create list-->

        </ul>

    </div>

    <script src="javascript/script.js"></script>

</body>
</html>
